services:
  couchdb:
    image: couchdb:3.3
    container_name: q-poc-couchdb
    restart: unless-stopped
    environment:
      COUCHDB_USER: admin
      COUCHDB_PASSWORD: password
    ports:
      - "5984:5984"
    volumes:
      - couchdb_data:/opt/couchdb/data

  couchdb-init:
    image: curlimages/curl:8.7.1
    container_name: q-poc-couchdb-init
    restart: "no"
    depends_on:
      - couchdb
    command:
      - /bin/sh
      - -ec
      - |
        until curl -sf "http://admin:password@couchdb:5984/_up"; do
          sleep 1
        done
        curl -sf -X PUT "http://admin:password@couchdb:5984/_users" || true
        curl -sf -X PUT "http://admin:password@couchdb:5984/_replicator" || true
        curl -sf -X PUT "http://admin:password@couchdb:5984/_global_changes" || true

  tool-basic:
    build:
      context: ./tool-basic
    container_name: q-poc-tool-basic
    restart: unless-stopped
    environment:
      PORT: 4000
      TOOL_NAME: simple-bars
      NODE_OPTIONS: --max-old-space-size=256
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "4000:4000"

  q-server:
    build:
      context: ./q-server
    container_name: q-poc-server
    restart: unless-stopped
    depends_on:
      - couchdb
      - couchdb-init
      - tool-basic
    environment:
      PORT: 3001
      COUCH_URL: http://admin:password@couchdb:5984
      COUCH_DB: q_items
      TOOL_NAME: simple-bars
      TOOL_BASE_URL: http://tool-basic:4000
      ALLOWED_ORIGIN: http://localhost:8080
      SESSION_SECRET: q-poc-dev-secret
      SEED_EXAMPLE_ITEM: "true"
      NODE_OPTIONS: --max-old-space-size=256
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "3001:3001"

  q-editor:
    image: nzzonline/q-editor:v6.6.0
    platform: linux/amd64
    container_name: q-poc-editor
    restart: unless-stopped
    depends_on:
      q-server:
        condition: service_healthy
    environment:
      PORT: 8080
      Q_SERVER_BASE_URL: http://localhost:3001
      LOGIN_MESSAGE: "Mini POC Q (local): connectez-vous avec n'importe quel identifiant."
      DEV_LOGGING: "false"
      PUSH_STATE: "false"
      NODE_OPTIONS: --max-old-space-size=256
    ports:
      - "8080:8080"

volumes:
  couchdb_data:
